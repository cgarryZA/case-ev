<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>CS2 Case Dashboard — Chroma 2</title>
<link rel="stylesheet" href="./style.css" />
<script type="module" src="./case_ev.js"></script>
<script type="module" src="./analysis.js"></script>
</head>
<body>
  <header>
    <div class="title">CS2 Case Dashboard</div>
    <div class="subtitle">Case EV vs Case Price</div>
  </header>
  <div class="container">
    <!-- Main case chart (full width) -->
    <section class="card case-banner">
      <h2>Chroma 2</h2>
      <div class="chart" data-chart-id="case-chart"></div>
    </section>

    <!-- analysis.js will insert this card right below the case banner -->
    <section class="card" id="analysis-card"></section>

    <section>
      <h3 style="margin:12px 0;">Skins in Case</h3>
      <div class="grid" id="skins-grid"></div>
    </section>

    <section>
      <h3 style="margin:12px 0;">Special Items in Case</h3>
      <div class="grid" id="special-grid"></div>
    </section>
  </div>
</body>
</html>
